spring:
  application:
    name: lis-open-java
  
  # MySQL数据库配置（当前使用）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql8.0:3306/lisdata?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}

  # SQL初始化配置
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

  # H2数据库配置（已移除）
  # datasource:
  #   driver-class-name: org.h2.Driver
  #   url: jdbc:h2:file:./data/lisdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

  # SQL Server数据库配置（已移除）
  # datasource:
  #   driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  #   url: jdbc:sqlserver://localhost:1433

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      # 注意：sys_czydm 表的 sybz 字段：1=使用中，0=停用
      # 如果使用逻辑删除，应该：logic-delete-value: 0, logic-not-delete-value: 1
      # 但为了兼容旧系统，暂时不使用逻辑删除，直接查询所有记录
      # logic-delete-field: sybz
      # logic-delete-value: 0
      # logic-not-delete-value: 1

logging:
  level:
    com.lis: debug
    org.springframework.web: info
