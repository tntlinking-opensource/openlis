spring:
  application:
    name: lis-open-java

  # MySQL数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql8.0:3306/lisdata?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}

  # SQL初始化配置
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

  # H2数据库配置（开发环境使用）
  # datasource:
  #   driver-class-name: org.h2.Driver
  #   url: jdbc:h2:file:./data/lisdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

  # SQL Server数据库配置（如需使用请取消注释）
  # datasource:
  #   driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  #   url: jdbc:sqlserver://localhost:1433

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      # 逻辑删除配置（如 sys_czydm 的 sybz 字段：1=使用，0=停用）
      # 如需使用逻辑删除，请配置：logic-delete-value: 0, logic-not-delete-value: 1
      # 目前项目未使用逻辑删除，无需配置
      # logic-delete-field: sybz
      # logic-delete-value: 0
      # logic-not-delete-value: 1

logging:
  level:
    com.lis: debug
    org.springframework.web: info
